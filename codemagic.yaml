workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
          echo "APK dhundh rahe hain..."
          find $HOME -name "app-debug.apk" 2>/dev/null
          find /Users -name "app-debug.apk" 2>/dev/null
          APK_PATH=$(find . -name "app-debug.apk" 2>/dev/null | head -1)
          echo "Mila: $APK_PATH"
          mkdir -p build/app/outputs/flutter-apk/
          cp "$APK_PATH" build/app/outputs/flutter-apk/app-debug.apk
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - yashrajput7766@gmail.com
        notify:
          success: true
          failure: true
