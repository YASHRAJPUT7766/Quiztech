workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --debug --verbose
          echo "=== Finding APK ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== Copying APK ==="
          mkdir -p build/app/outputs/flutter-apk/
          find . -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/app-debug.apk \; 2>/dev/null || true
    artifacts:
      - build/**/*.apk
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - yashrajput7766@gmail.com
        notify:
          success: true
          failure: true
