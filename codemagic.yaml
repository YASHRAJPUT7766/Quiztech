workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
          mkdir -p $CM_BUILD_DIR/build/app/outputs/flutter-apk
          find . -name "app-debug.apk" -exec cp {} $CM_BUILD_DIR/build/app/outputs/flutter-apk/app-debug.apk \;
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - yash92726@gmail.com
        notify:
          success: true
          failure: true
